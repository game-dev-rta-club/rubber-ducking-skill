name: Bug report
description: Report reproducible incorrect behavior in a skill or plugin package.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use the private process in SECURITY.md.
  - type: dropdown
    id: surface
    attributes:
      label: Agent surface
      options:
        - Codex
        - Claude Code
        - Project-local skill files
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.0.0 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the prompt and relevant result after removing sensitive data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Product version, operating system, and relevant configuration
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets and personal information from this report.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
