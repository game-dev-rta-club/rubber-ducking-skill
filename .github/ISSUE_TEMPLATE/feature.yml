name: Feature request
description: Propose a new skill or an improvement to an existing workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What recurring agent workflow or failure should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest reusable workflow that would help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What prompts, skills, or tools already address part of the problem?
  - type: textarea
    id: examples
    attributes:
      label: Example prompts or outcomes
      description: Remove secrets and personal information before submitting.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
